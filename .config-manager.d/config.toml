# Documentation: https://github.com/northwood-labs/config-manager
config_version = '1.0'

[default]
  # Shared upstream repository URL. When set, source and stub values
  # that are relative paths are resolved within this repository.
  repository = 'file://../.github'

  # # Name of an environment variable containing a bearer token
  # # for authenticated HTTP requests.
  # bearer_token_env = 'CONFIG_MANAGER_TOKEN'
  #
  # # HTTP request timeout in seconds (default: 30).
  # timeout = 30
